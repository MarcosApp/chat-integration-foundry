<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ app_title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <div class="bg-shape shape-a"></div>
  <div class="bg-shape shape-b"></div>

  <main class="app-shell">
    <header class="chat-header">
      <div class="identity">
        <div class="avatar">CV</div>
        <div>
          <h1>Conviva Bot</h1>
          <p id="status">Conectando...</p>
        </div>
      </div>
      <button id="new-chat" class="ghost-btn">Nova conversa</button>
    </header>

    <section id="chat-window" class="chat-window" aria-live="polite"></section>

    <form id="chat-form" class="chat-form">
      <textarea
        id="message"
        rows="1"
        placeholder="Escreva uma mensagem..."
        autocomplete="off"
      ></textarea>
      <button type="submit" id="send">Enviar</button>
    </form>
  </main>

  <template id="message-template">
    <article class="bubble-row">
      <div class="bubble-meta"></div>
      <div class="bubble"></div>
    </article>
  </template>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
